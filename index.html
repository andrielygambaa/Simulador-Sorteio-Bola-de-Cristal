<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bola de Cristal da Sorte</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Montserrat:wght@400;700&family=Raleway:wght@300;500&family=Imperial+Script&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1 class="titulo">Bola de Cristal</h1>

<div class="bola-container">

<div class="bola">

</div>

<div id="resultado" class="resultado"></div>

</div>
